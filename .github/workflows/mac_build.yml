name: Build and release

on:
  push:
    branches:
      - "feature/mac_package"

jobs:
  build:
    strategy:
      matrix:
        include:
#          - os: windows-latest
#            artifact-name: windows
#            package-path: composeApp/build/compose/binaries/main/msi/*.msi

          - os: macos-latest
            artifact-name: macos
            package-path: composeApp/build/compose/binaries/main/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build package
        run: ./gradlew packageDistributionForCurrentOS

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: composeApp/build/compose/logs/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.package-path }}
