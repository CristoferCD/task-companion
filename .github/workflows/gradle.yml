name: Build and release

on:
  push:
    tags: 
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact-name: windows
            package-path: composeApp/build/compose/binaries/main/msi/*.msi

          - os: macos-latest
            artifact-name: macos
            package-path: composeApp/build/compose/binaries/main/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build package
        run: ./gradlew packageDistributionForCurrentOS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.package-path }}

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Retrieve Version
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName)
          echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION_NAME }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.dmg